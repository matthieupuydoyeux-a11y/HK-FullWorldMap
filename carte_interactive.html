<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carte Interactive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;background:#07080f;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
#app{display:flex;height:100vh;width:100vw}

/* MAP */
#mw{flex:1;position:relative;overflow:hidden;cursor:grab}
#mw.drag{cursor:grabbing}
#mi{position:absolute;transform-origin:0 0;will-change:transform}
/* SVG rendu net à tous les niveaux de zoom */
#mi svg{display:block;shape-rendering:geometricPrecision;text-rendering:geometricPrecision}

/* PANEL */
#panel{width:0;min-width:0;background:#0d0d1a;border-left:1px solid #1a1a2e;display:flex;flex-direction:column;overflow:hidden;transition:width .28s cubic-bezier(.4,0,.2,1);flex-shrink:0}
#panel.open{width:340px;min-width:340px}
#ps{flex:1;overflow-y:auto;overflow-x:hidden}
#ps::-webkit-scrollbar{width:4px}
#ps::-webkit-scrollbar-thumb{background:#2a2a42;border-radius:2px}

/* Panel header */
#ph{padding:14px 18px 12px;border-bottom:1px solid #1a1a2e;display:flex;align-items:flex-start;gap:10px;position:sticky;top:0;background:#0d0d1a;z-index:1;flex-shrink:0}
#ph-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
#ph-t{flex:1;min-width:0}
#ph-name{font-size:15px;font-weight:700;color:#e8e0cc;line-height:1.3}
#ph-nation{font-size:11px;color:#444460;margin-top:2px}
#ph-close{background:none;border:none;color:#333;cursor:pointer;font-size:22px;line-height:1;padding:0 2px;transition:color .15s;flex-shrink:0}
#ph-close:hover{color:#888}

/* Panel body */
#pb{padding:16px 18px 28px}
#pb-imgwrap{width:100%;aspect-ratio:16/9;border-radius:6px;overflow:hidden;margin-bottom:14px;background:#111125;display:flex;align-items:center;justify-content:center}
#pb-imgwrap img{width:100%;height:100%;object-fit:cover;display:none}
#pb-imgwrap span{color:#252540;font-size:12px}
#pb-desc{font-size:13px;line-height:1.75;color:#9a9280;margin-bottom:16px}
#pb-chars{display:flex;flex-direction:column}
.cr{display:flex;gap:10px;align-items:baseline;padding:8px 0;border-bottom:1px solid #111122}
.cr:last-child{border-bottom:none}
.cl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#3a3a55;flex-shrink:0;width:110px}
.cv{font-size:12.5px;color:#706878;line-height:1.5;flex:1}
.d1{color:#4a8a4a}.d2{color:#7a8a4a}.d3{color:#8a7a3a}.d4{color:#8a5a3a}.d5{color:#8a3a3a}

/* Controls */
/* Filtre de niveau */
#filter-bar{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;background:rgba(10,10,20,0.88);border:1px solid #1e1e35;border-radius:10px;padding:6px 8px;backdrop-filter:blur(6px)}
.fb{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:background .15s,border-color .15s;user-select:none}
.fb input[type=radio]{display:none}
.fb-icon{font-size:15px;line-height:1}
.fb-label{font-size:11px;letter-spacing:.5px;color:#555;white-space:nowrap;transition:color .15s}
.fb.active{background:#161628;border-color:#3a3a5a}
.fb.active .fb-label{color:#c8c0d8}
.fb:hover:not(.active){background:#0f0f20}
.fb:hover:not(.active) .fb-label{color:#888}
/* Contrôles zoom */
#ctrls{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:6px;z-index:5}
.cb{width:34px;height:34px;background:#0d0d1a;border:1px solid #1e1e35;border-radius:6px;color:#555;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.cb:hover{background:#181828;color:#bbb}
#zlvl{font-size:10px;text-align:center;color:#2a2a3a;font-family:monospace;padding:2px 0}

/* Loading */
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;background:#07080f}
#lbar{width:160px;height:2px;background:#111125;border-radius:1px;overflow:hidden}
#lfill{height:100%;background:#4a4a8a;width:0%;transition:width .3s}
#loading p{font-size:11px;letter-spacing:1.5px;color:#2a2a4a}
</style>
</head>
<body>
<div id="app">
  <div id="mw">
    <div id="loading"><div id="lbar"><div id="lfill"></div></div><p>CHARGEMENT DE LA CARTE…</p></div>
    <div id="mi"></div>

    <!-- Filtre de niveau -->
    <div id="filter-bar">
      <label class="fb active" id="fb0">
        <input type="radio" name="level" value="0" checked>
        <span class="fb-icon">🌍</span>
        <span class="fb-label">Grandes régions</span>
      </label>
      <label class="fb" id="fb1">
        <input type="radio" name="level" value="1">
        <span class="fb-icon">⚔️</span>
        <span class="fb-label">Nations &amp; zones indépendantes</span>
      </label>
      <label class="fb" id="fb2">
        <input type="radio" name="level" value="2">
        <span class="fb-icon">📍</span>
        <span class="fb-label">Zones précises</span>
      </label>
    </div>
    <div id="ctrls">
      <button class="cb" id="zi">+</button>
      <div id="zlvl">100%</div>
      <button class="cb" id="zo">−</button>
      <button class="cb" id="zr" style="font-size:12px">⌂</button>
    </div>
  </div>
  <div id="panel">
    <div id="ps">
      <div id="ph">
        <div id="ph-dot"></div>
        <div id="ph-t"><div id="ph-name"></div><div id="ph-nation"></div></div>
        <button id="ph-close" onclick="closePanel()">×</button>
      </div>
      <div id="pb">
        <div id="pb-imgwrap"><img id="pb-img" alt=""><span id="pb-ph">Aucune illustration</span></div>
        <div id="pb-desc"></div>
        <div id="pb-chars"></div>
      </div>
    </div>
  </div>
</div>

// ── Classification des niveaux ────────────────────────────────────────────────
// Niveau 0 : Grandes régions  → nation === "Région principale" ou "Dimension à part"
// Niveau 1 : Nations + zones indépendantes → nation est un nom de région seul (sans " — ")
// Niveau 2 : Zones précises → nation contient " — "
function getLevel(id){
  const d=REGIONS[id];
  if(!d) return -1; // id inconnu, on l'ignore
  const n=d.nation||"";
  if(n==="Région principale"||n==="Dimension à part") return 0;
  if(n.includes(" — ")||n.includes("(indépendant)")) return 2;
  // Soultaker's Soul est une dimension (niveau 0) sans nations intermédiaires :
  // ses zones vont directement au niveau 2
  if(n==="Soultaker's Soul") return 2;
  return 1;
}

const mi=document.getElementById("mi");
const panel=document.getElementById("panel");
let sc=1,tx=0,ty=0,drag=false,sx=0,sy=0,stx=0,sty=0,activeEl=null;
let svgW=0,svgH=0;
let currentLevel=0; // niveau actif par défaut
let borderEls=[]; // tous les éléments Border_ du SVG

// ── Applique le filtre de niveau ──────────────────────────────────────────────
function applyLevelFilter(level){
  currentLevel=level;
  closePanel();
  borderEls.forEach(el=>{
    const lv=getLevel(el.id);
    if(lv===level){
      // Niveau actif : activer le groupe et tous ses enfants
      el.style.pointerEvents="all";
      el.querySelectorAll("*").forEach(child=>child.style.pointerEvents="all");
    } else {
      // Niveau inactif : désactiver le groupe lui-même
      el.style.pointerEvents="none";
      // Désactiver aussi les hit rects qu'on a ajoutés (marqués data-hit-rect)
      // sans toucher aux autres enfants (royaumes/zones restent cliquables en dessous)
      el.querySelectorAll("[data-hit-rect]").forEach(r=>r.style.pointerEvents="none");
    }
  });
  document.querySelectorAll(".fb").forEach(fb=>{
    fb.classList.toggle("active", fb.querySelector("input").value==level);
  });
} // dimensions natives du SVG, lues une fois au chargement

async function loadMap(){
  const lf=document.getElementById("lfill");
  lf.style.width="25%";
  try{
    const res=await fetch(SVG_URL);
    if(!res.ok) throw new Error("HTTP "+res.status);
    lf.style.width="70%";
    const txt=await res.text();
    mi.innerHTML=txt;
    const svg=mi.querySelector("svg");

    // ── 1. Lire les dimensions AVANT de supprimer les attributs ──────────────
    const vb=svg.viewBox.baseVal;
    svgW=vb.width||parseFloat(svg.getAttribute("width"))||0;
    svgH=vb.height||parseFloat(svg.getAttribute("height"))||0;

    // Appliquer une taille fixe en pixels = dimensions natives du SVG
    svg.removeAttribute("width"); svg.removeAttribute("height");
    svg.style.display="block";
    svg.style.width=svgW+"px";
    svg.style.height=svgH+"px";
    svg.style.overflow="visible";

    // ── 2. Interactions entièrement en JS (ignore les styles internes du SVG) ─
    // Collecter tous les Border_ et forcer pointer-events via style inline
    borderEls=Array.from(svg.querySelectorAll("[id]")).filter(el=>el.id.startsWith("Border_"));
    console.log(`Éléments Border_ trouvés : ${borderEls.length}`);

    // Rendre toute la surface cliquable.
    // Figma exporte fill="none" sur les paths → seul le contour répond à la souris.
    // fill="transparent" est visuellement identique mais rend l'intérieur cliquable.
    // On ajoute aussi un <rect> de couverture (bounding box) comme zone de hit de secours.
    borderEls.forEach(borderEl=>{
      // 1. fill="none" → "transparent" sur les formes directes (hors masques/defs)
      borderEl.querySelectorAll("path,rect,polygon,polyline,ellipse,circle").forEach(shape=>{
        // Ignorer les éléments à l'intérieur de <mask>, <clipPath>, <defs>
        let p=shape.parentElement;
        while(p && p!==borderEl){
          if(/^(mask|clipPath|defs|symbol)$/i.test(p.tagName)) return;
          p=p.parentElement;
        }
        if(shape.getAttribute("fill")==="none") shape.setAttribute("fill","transparent");
        if(shape.style.fill==="none") shape.style.fill="transparent";
      });

      // 2. Rect transparent sur toute la bounding box — uniquement pour les grandes régions (niveau 0).
      // Inséré en PREMIER enfant (= derrière tout) et marqué pour être géré par le filtre.
      if(getLevel(borderEl.id)===0){
        try{
          const bb=borderEl.getBBox();
          if(bb.width>0 && bb.height>0){
            const hit=document.createElementNS("http://www.w3.org/2000/svg","rect");
            hit.setAttribute("x",bb.x); hit.setAttribute("y",bb.y);
            hit.setAttribute("width",bb.width); hit.setAttribute("height",bb.height);
            hit.setAttribute("fill","transparent");
            hit.dataset.hitRect="true"; // marque pour applyLevelFilter
            hit.style.pointerEvents="all";
            borderEl.insertBefore(hit, borderEl.firstChild); // DERRIÈRE tout
          }
        }catch(e){}
      }
    });

    svg.querySelectorAll("*").forEach(el=>{
      el.style.pointerEvents="all";
      el.style.cursor="default";
    });

    // Trouver le Border_ ancêtre correspondant au niveau actif
    // Remonte dans le DOM jusqu'à trouver un Border_ dont le niveau == currentLevel
    function findBorder(el){
      while(el && el!==svg){
        if(el.id && el.id.startsWith("Border_") && getLevel(el.id)===currentLevel) return el;
        el=el.parentElement;
      }
      return null;
    }

    // Click → ouvrir région (seulement si le niveau correspond)
    svg.addEventListener("click",e=>{
      const b=findBorder(e.target);
      if(b && getLevel(b.id)===currentLevel) openRegion(b.id,b);
      else if(!b) closePanel();
    });

    // Hover
    svg.addEventListener("mouseover",e=>{
      const b=findBorder(e.target);
      if(b && b!==activeEl && getLevel(b.id)===currentLevel){
        b.style.filter="brightness(1.8) saturate(1.4) drop-shadow(0 0 4px rgba(255,255,255,0.35))";
        b.style.cursor="pointer";
      }
    });
    svg.addEventListener("mouseout",e=>{
      const b=findBorder(e.target);
      if(b && b!==activeEl) b.style.filter="";
    });

    // Brancher les boutons radio de filtre
    document.querySelectorAll("input[name='level']").forEach(radio=>{
      radio.addEventListener("change",()=>applyLevelFilter(parseInt(radio.value)));
    });

    lf.style.width="100%";
    setTimeout(()=>{
      document.getElementById("loading").style.display="none";
      fit();
      applyLevelFilter(0); // appliquer le filtre initial
    },200);

    lf.style.width="100%";
    setTimeout(()=>{
      document.getElementById("loading").style.display="none";
      fit();
    },200);
  }catch(e){
    document.getElementById("loading").innerHTML=
      `<p style="color:#7a3a3a;font-size:13px;text-align:center;padding:24px">
        Erreur de chargement du SVG.<br><small>${e.message}</small><br><br>
        <span style="color:#444;font-size:11px">Assurez-vous d'ouvrir le fichier via un serveur local<br>(ex: VS Code Live Preview, ou un serveur HTTP).</span>
      </p>`;
  }
}

// ── Fit : centre le SVG dans la fenêtre au démarrage ─────────────────────────
function fit(){
  if(!svgW||!svgH) return;
  const cw=mw.clientWidth, ch=mw.clientHeight;
  sc=Math.min(cw/svgW, ch/svgH)*0.95;
  tx=(cw-svgW*sc)/2;
  ty=(ch-svgH*sc)/2;
  apply();
}
function apply(){mi.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;document.getElementById("zlvl").textContent=Math.round(sc*100)+"%";}
function zoom(d){const cx=mw.clientWidth/2,cy=mw.clientHeight/2,ns=Math.min(Math.max(sc*d,.1),20);tx=cx-(cx-tx)*(ns/sc);ty=cy-(cy-ty)*(ns/sc);sc=ns;apply();}

mw.addEventListener("wheel",e=>{
  e.preventDefault();
  const r=mw.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const d=e.deltaY<0?1.12:.89,ns=Math.min(Math.max(sc*d,.1),20);
  tx=mx-(mx-tx)*(ns/sc);ty=my-(my-ty)*(ns/sc);sc=ns;apply();
},{passive:false});
mw.addEventListener("mousedown",e=>{if(e.button!==0)return;drag=true;sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;mw.classList.add("drag");});
window.addEventListener("mousemove",e=>{if(!drag)return;tx=stx+e.clientX-sx;ty=sty+e.clientY-sy;apply();});
window.addEventListener("mouseup",()=>{drag=false;mw.classList.remove("drag");});
document.getElementById("zi").onclick=()=>zoom(1.25);
document.getElementById("zo").onclick=()=>zoom(.8);
document.getElementById("zr").onclick=fit;

let lt=0;
mw.addEventListener("touchstart",e=>{
  if(e.touches.length===1){drag=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY;stx=tx;sty=ty;}
  else if(e.touches.length===2){drag=false;lt=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:true});
mw.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag){tx=stx+e.touches[0].clientX-sx;ty=sty+e.touches[0].clientY-sy;apply();}
  else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const r=mw.getBoundingClientRect(),mx=cx-r.left,my=cy-r.top;
    const ns=Math.min(Math.max(sc*d/lt,.1),20);
    tx=mx-(mx-tx)*(ns/sc);ty=my-(my-ty)*(ns/sc);sc=ns;lt=d;apply();
  }
},{passive:false});
mw.addEventListener("touchend",()=>{drag=false;});

function openRegion(id,el){
  // Réinitialiser l'ancien actif
  if(activeEl && activeEl!==el){
    activeEl.style.filter="";
    activeEl.classList.remove("active");
  }
  el.classList.add("active");
  el.style.filter="brightness(2.2) saturate(1.6) drop-shadow(0 0 6px rgba(255,255,255,0.65))";
  activeEl=el;
  const d=REGIONS[id];
  const color=(d&&d.color)||"#5a5a7a";
  document.getElementById("ph-dot").style.background=color;
  document.getElementById("ph-name").textContent=d?d.name:id.replace("Border_","");
  document.getElementById("ph-nation").textContent=d?d.nation:"";
  const img=document.getElementById("pb-img"),ph=document.getElementById("pb-ph");
  if(d&&d.image){img.src=d.image;img.style.display="block";ph.style.display="none";}
  else{img.style.display="none";ph.style.display="block";}
  document.getElementById("pb-desc").textContent=d?d.desc:"Aucune description disponible.";
  const chars=document.getElementById("pb-chars");
  chars.innerHTML="";
  if(d){
    [["Population",d.population],["Races",d.races],["Environnement",d.environment],
     ["Niveau de danger",d.danger],["Personnages notables",d.characters],["Lieux notables",d.places]
    ].forEach(([label,val])=>{
      if(!val||val==="—")return;
      const row=document.createElement("div");row.className="cr";
      const l=document.createElement("div");l.className="cl";l.textContent=label;
      const v=document.createElement("div");v.className="cv";
      if(label==="Niveau de danger"&&typeof val==="number"){
        v.textContent=DL[val]||val;v.style.color=DC[val]||"";
      }else{v.textContent=val;}
      row.appendChild(l);row.appendChild(v);chars.appendChild(row);
    });
  }
  panel.classList.add("open");
}
function closePanel(){
  if(activeEl){activeEl.style.filter="";activeEl.classList.remove("active");activeEl=null;}
  panel.classList.remove("open");
}

loadMap().catch(e=>{
  document.getElementById("loading").innerHTML=`<p style="color:#6a3a3a;font-size:13px;text-align:center;padding:20px">Erreur de chargement.<br><small>${e.message}</small></p>`;
});
</script>
